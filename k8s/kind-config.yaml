kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: logpulse
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80     # frontend nginx (hostNetwork)
        hostPort: 3000
        protocol: TCP
      - containerPort: 8000   # backend (hostNetwork)
        hostPort: 8000
        protocol: TCP
