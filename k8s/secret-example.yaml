# Copy to secret.yaml and fill in base64-encoded values.
# kubectl create secret generic logpulse-secrets \
#   --from-literal=database-url='postgresql://user:pass@host:5432/logpulse'
apiVersion: v1
kind: Secret
metadata:
  name: logpulse-secrets
type: Opaque
stringData:
  database-url: "postgresql://logpulse:logpulse@postgres:5432/logpulse"
