services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logpulse
      POSTGRES_USER: logpulse
      POSTGRES_PASSWORD: logpulse
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logpulse -d logpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://logpulse:logpulse@db:5432/logpulse
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://logpulse:logpulse@db:5432/logpulse
    command: python scripts/seed.py
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    profiles:
      - seed

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
